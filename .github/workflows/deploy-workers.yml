name: Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/**'
      - 'airaquas-brand.html'
      - 'frontend/public/**'
      - 'frontend/**'
      - 'server/public/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Diagnose deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -e
          echo "::group::Wrangler version"
          npx --yes wrangler --version 2>&1 || true
          echo "::endgroup::"
          echo "::group::Test token (whoami)"
          npx wrangler whoami 2>&1 || echo "TOKEN_STATUS=fail" >> $GITHUB_ENV
          echo "::endgroup::"
          echo "::group::Try deploy (verbose)"
          npx wrangler deploy --dry-run 2>&1 || echo "BUILD_STATUS=fail" >> $GITHUB_ENV
          echo "::endgroup::"
          echo "::group::Actual deploy"
          npx wrangler deploy 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "DEPLOY_STATUS=$EXIT_CODE" >> $GITHUB_ENV
          echo "::endgroup::"
        continue-on-error: true

  # Pages deployment removed: Worker handles ALL routes exclusively.
  # Previous Pages SPA fallback was intercepting /salon, /shop and
  # serving brand.html instead of passing through to the Worker.
