name: Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/**'
      - 'airaquas-brand.html'
      - 'frontend/public/**'
      - 'frontend/**'
      - 'server/public/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Deploy Worker (airaquas-platform)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy old full-featured SPA to Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          mkdir -p pages-dist
          cp airaquas-brand.html pages-dist/index.html
          cp frontend/public/_redirects pages-dist/_redirects 2>/dev/null || true
          cp -r server/public/data pages-dist/ 2>/dev/null || true
          npx wrangler pages deploy pages-dist --project-name airaquas-hair
