name: Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/**'
      - 'airaquas-brand.html'
      - 'frontend/public/**'
      - 'frontend/**'
      - 'server/public/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Deploy Worker (airaquas-platform)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler deploy 2>&1
          echo "Exit code: $?"

  # Pages deployment removed: Worker handles ALL routes exclusively.
  # Previous Pages SPA fallback was intercepting /salon, /shop and
  # serving brand.html instead of passing through to the Worker.
