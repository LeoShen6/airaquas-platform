name: Deploy
on:
  push:
    branches: [main]
    paths: ['src/**', 'wrangler.toml', 'package.json', '.github/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy root Worker (airaquas-platform)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm install hono
          npx wrangler deploy
