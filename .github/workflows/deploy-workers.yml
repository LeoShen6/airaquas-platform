name: Deploy Workers
on:
  push:
    branches: [main]
    paths: ['workers/**', 'shared/**', 'wrangler.toml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy all workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          for worker in api-auth api-crm api-order api-inventory api-diagnosis api-marketing api-profit api-report; do
            echo "=== Deploying $worker ==="
            cd workers/$worker
            npm install
            npx wrangler deploy
            cd ../..
          done
