name: Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/**'
      - 'airaquas-brand.html'
      - 'frontend/public/**'
      - 'frontend/**'
      - 'server/public/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: 🔍 Diagnose deploy
        id: diag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        shell: bash
        run: |
          echo "### ⚙️ Wrangler Deploy Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**1. Wrangler version**"
          echo '```' >> $GITHUB_STEP_SUMMARY
          WVR=$(npx wrangler --version 2>&1)
          echo "version: $WVR"
          echo "$WVR" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**2. Auth check**"
          echo '```' >> $GITHUB_STEP_SUMMARY
          AUTH=$(npx wrangler whoami 2>&1)
          echo "$AUTH" | head -5
          echo "$AUTH" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**3. Dry run (build test)**"
          echo '```' >> $GITHUB_STEP_SUMMARY
          DRY=$(npx wrangler deploy --dry-run 2>&1)
          echo "$DRY" | head -10
          echo "$DRY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**4. Actual deploy**"
          echo '```' >> $GITHUB_STEP_SUMMARY
          DEP=$(npx wrangler deploy 2>&1)
          EXIT_CODE=$?
          echo "$DEP"
          echo "$DEP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Exit code:** $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
          exit 0

  # Pages deployment removed: Worker handles ALL routes exclusively.
  # Previous Pages SPA fallback was intercepting /salon, /shop and
  # serving brand.html instead of passing through to the Worker.
