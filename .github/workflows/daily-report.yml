name: Daily Report
on:
  schedule:
    - cron: '0 22 * * *'  # 每天 6:00 北京时间
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate daily report
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: d1 execute airaquas-hair --remote --command="SELECT DATE('now') as date, COUNT(*) as users FROM users"
