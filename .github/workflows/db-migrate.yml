name: D1 Database Migration
on:
  push:
    branches: [main]
    paths: ['shared/schema.sql']

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute D1 migration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: d1 execute airaquas-hair --remote --file=shared/schema.sql
