name = "airaquas-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ═══ Routes ═══
# Worker handles all paths via Cloudflare dashboard custom domain.
# Route config here would cause version conflicts with dashboard-managed routes.

# ═══ D1 Database (SQLite) ═══
[[d1_databases]]
binding = "DB"
database_name = "airaquas-hair"
database_id = "aaccdbdb-1592-41dd-b906-891d0a9a9556"

# ═══ R2 Storage (user-uploaded scalp photos) ═══
[[r2_buckets]]
binding = "R2"
bucket_name = "airaquas-hair"

# ═══ KV Namespace (image dedup cache) ═══
[[kv_namespaces]]
binding = "KV"
id = "310cf3f8f1184ddc823c116242515435"

# ═══ Workers AI (vision analysis) ═══
[ai]
binding = "AI"

# ═══ Environment variables ═══
[vars]
AI_PROVIDER = "dashscope"
