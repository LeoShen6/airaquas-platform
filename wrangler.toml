name = "airaquas-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  "airaquas.hair/*",
]

# ═══ Environment variables (can be overridden per env) ═══
[vars]
DASHSCOPE_API_KEY = ""

# ═══ Secrets (set via `wrangler secret put <name>`) ═══
# DASHSCOPE_API_KEY = "sk-xxx"  # Set manually for production
