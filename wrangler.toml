name = "airaquas-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "airaquas-hair"
database_id = "aaccdbdb-1592-41dd-b906-891d0a9a9556"

# R2 存储绑定
[[r2_buckets]]
binding = "R2"
bucket_name = "airaquas-hair"


# KV 命名空间
[[kv_namespaces]]
binding = "KV"
id = "310cf3f8f1184ddc823c116242515435"
