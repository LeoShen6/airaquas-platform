name = "airaquas-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ═══ Routes ═══
# Worker handles ALL traffic — root serves the full SPA (brand + community + products)
routes = [
  # Main domain (custom_domain = SSL for SaaS, auto-verified)
  { pattern = "airaquas.hair/*", custom_domain = true },
  # Subdomains — each must be individually declared for SSL cert issuance
  { pattern = "detect.airaquas.hair/*",  custom_domain = true },
  { pattern = "fenzhen.airaquas.hair/*", custom_domain = true },
  { pattern = "guide.airaquas.hair/*",   custom_domain = true },
  { pattern = "salon.airaquas.hair/*",   custom_domain = true },
  { pattern = "tony.airaquas.hair/*",    custom_domain = true },
  { pattern = "shop.airaquas.hair/*",    custom_domain = true },
  # Wildcard catch-all (no custom_domain — requires DNS records to exist)
  # Note: without DNS CNAME/A records on each subdomain, wildcard won't route
  "*.airaquas.hair/*",
  # Legacy path patterns
  "airaquas.hair/fenzhen*",
  "airaquas.hair/guide*",
  "airaquas.hair/research*",
  "airaquas.hair/sebderm*",
  "airaquas.hair/postpartum*",
  "airaquas.hair/alopecia-areata*",
  "airaquas.hair/seasonal*",
  "airaquas.hair/dandruff*",
  "airaquas.hair/folliculitis*",
  "airaquas.hair/detect*",
  "airaquas.hair/api*",
]

# ═══ D1 Database (SQLite) ═══
[[d1_databases]]
binding = "DB"
database_name = "airaquas-hair"
database_id = "aaccdbdb-1592-41dd-b906-891d0a9a9556"

# ═══ R2 Storage (user-uploaded scalp photos) ═══
[[r2_buckets]]
binding = "R2"
bucket_name = "airaquas-hair"

# ═══ KV Namespace (image dedup cache) ═══
[[kv_namespaces]]
binding = "KV"
id = "310cf3f8f1184ddc823c116242515435"

# ═══ Workers AI (vision analysis) ═══
[ai]
binding = "AI"

# ═══ Environment variables ═══
[vars]
AI_PROVIDER = "dashscope"
