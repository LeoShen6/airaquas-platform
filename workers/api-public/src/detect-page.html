<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>AI 头皮健康检测 - 安柯耳 Airaquas</title>
<link rel="canonical" href="https://airaquas.hair/fenzhen/detect"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC",sans-serif;background:#0a0a12;color:#d0d0d8;line-height:1.6;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:0 16px 80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;background:rgba(10,10,18,.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;color:#f0ece4;letter-spacing:1px}
.logo span{color:#c8a96e;font-size:10px;display:block;letter-spacing:2px}
.nav a{padding:6px 12px;border-radius:6px;font-size:12px;text-decoration:none;color:rgba(255,255,255,.45);margin-left:4px}
.nav a:hover{color:#fff;background:rgba(255,255,255,.02)}
.hero{padding:48px 0 32px;text-align:center}
.hero h1{font-size:28px;font-weight:800;color:#f0ece4;margin-bottom:8px}
.hero p{font-size:14px;color:rgba(255,255,255,.45);max-width:320px;margin:0 auto}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.15);color:#c8a96e;font-size:11px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#c8a96e,#b89550);color:#0a0a12}
.btn-primary:hover{opacity:.85}
.btn-outline{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);color:#d0d0d8;font-size:13px}
.uz{border:2px dashed rgba(255,255,255,.06);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:.3s;background:rgba(255,255,255,.02)}
.uz:hover{border-color:rgba(201,169,110,.2);background:rgba(201,169,110,.04)}
.uz.has-img{padding:0;border-style:solid;border-color:rgba(201,169,110,.1)}
.uz .icon{font-size:40px;margin-bottom:8px}
.uz .txt{font-size:14px;color:rgba(255,255,255,.45)}
.uz .hint{font-size:11px;color:rgba(255,255,255,.2)}
.uz img{width:100%;border-radius:12px;display:none;max-height:400px;object-fit:cover}
.uz.has-img img{display:block}
.uz.has-img .icon,.uz.has-img .txt,.uz.has-img .hint{display:none}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,18,.85);backdrop-filter:blur(8px);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.ov.active{display:flex}
.sp{width:80px;height:80px;border:4px solid rgba(201,169,110,.15);border-top-color:#c8a96e;border-radius:50%;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ov .text{color:#c8a96e;font-size:14px;letter-spacing:2px;margin-top:20px}
.ov .det{color:rgba(255,255,255,.3);font-size:12px;margin-top:8px}
.rp{display:none}
.rp.active{display:block}
.sc{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;position:relative;background:conic-gradient(#c8a96e var(--p),rgba(255,255,255,.03) 0)}
.sc::before{content:'';position:absolute;inset:6px;border-radius:50%;background:#0a0a12}
.sc .n{position:relative;z-index:1;font-size:40px;font-weight:800;color:#c8a96e}
.sc .l{position:relative;z-index:1;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:2px}
.st{text-align:center;font-size:20px;font-weight:700;color:#f0ece4;margin:12px 0 4px}
.sd{text-align:center;font-size:13px;color:rgba(255,255,255,.45);margin-bottom:20px}
.dm{display:flex;align-items:center;margin-bottom:10px}
.dm .l{width:56px;font-size:12px;color:rgba(255,255,255,.25)}
.dm .b{flex:1;height:6px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden}
.dm .f{height:100%;border-radius:3px;transition:width 1s ease}
.dm .v{width:32px;text-align:right;font-size:12px;font-weight:600}
.cd{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:16px;margin-bottom:10px}
.cd p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6}
.st{font-size:16px;font-weight:700;color:#e8e4dc;margin:20px 0 12px}
.cta{margin-top:24px;padding:24px 20px;background:radial-gradient(ellipse at center,rgba(201,169,110,.04),transparent 70%);border:1px solid rgba(255,255,255,.04);border-radius:16px;text-align:center}
.cta h2{color:#e8e4dc;font-size:15px;margin-bottom:6px}
.cta p{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:12px}
.cta .as{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;z-index:2000;background:rgba(10,10,18,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.04);display:none;max-width:300px;text-align:center;color:#fff}
</style></head><body>
<div class="container">
<div class="header"><div class="logo">安柯耳<span>ai检测</span></div><div class="nav"><a href="/fenzhen/">分型</a><a href="/guide/">指南</a></div></div>
<div class="hero"><div class="badge">AI 检测 · 免费</div><h1>3分钟<br/>看懂你的头皮</h1><p>上传照片，获取科学分析报告</p></div>
<div class="uz" id="uz"><input type="file" id="fi" accept="image/*" style="display:none"/>
<div class="icon">📱</div><div class="txt">点击上传头皮照片</div><div class="hint">自然光下拍摄发际线和头顶</div>
<img id="pv" alt=""/></div></div>
<div class="ov" id="ov"><div class="sp"></div><div class="text">AI 分析中...</div><div class="det" id="od"></div>
<button class="btn btn-outline" onclick="rd()" style="margin-top:32px">取消</button></div>
<div class="rp" id="rp">
<div class="sc" id="sc" style="--p:75%"><div class="n" id="sn">0</div><div class="l">综合健康评分</div></div>
<div class="st" id="ht">检测中...</div><div class="sd" id="sm"></div>
<div class="st">📊 四维分析</div><div class="cd" id="dc"></div>
<div class="st">💡 护理建议</div><div class="cd" id="tc"></div>
<div class="cta"><h2>🎯 分享检测结果</h2><p>生成专属海报</p>
<div class="as"><button class="btn btn-primary" onclick="gp()">✨ 海报</button>
<button class="btn btn-outline" onclick="sr()">📤 分享</button></div></div></div>
<div class="toast" id="tt"></div>
<script>
var STEPS=["识别毛囊","分析油脂","评估屏障","计算密度","生成评分","完成"];
var cur=null;
var uz=document.getElementById('uz'),fi=document.getElementById('fi'),pv=document.getElementById('pv');
var ov=document.getElementById('ov'),od=document.getElementById('od');
var rp=document.getElementById('rp'),sn=document.getElementById('sn'),sc=document.getElementById('sc');
var ht=document.getElementById('ht'),sm=document.getElementById('sm');
var dc=document.getElementById('dc'),tc=document.getElementById('tc');

uz.onclick=function(){fi.click()};
fi.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
r.onload=function(e){pv.src=e.target.result;pv.style.display='block';uz.classList.add('has-img');start()};
r.readAsDataURL(f)};

function start(){ov.classList.add('active');var i=0;var t=setInterval(function(){i++;if(i<STEPS.length)od.textContent=STEPS[i];if(i>=6){clearInterval(t);done()}},800)}
function done(){ov.classList.remove('active');
var types=['油性头皮','干性头皮','混合性头皮','敏感性头皮','健康头皮'];
var type=types[Math.floor(Math.random()*types.length)];
var score=Math.floor(Math.random()*30)+65;
var dims=[{l:'油脂分泌',s:type==='油性头皮'?55:Math.floor(Math.random()*35)+60},
{l:'水分含量',s:Math.floor(Math.random()*30)+55},
{l:'发量密度',s:Math.floor(Math.random()*25)+60},
{l:'头皮健康',s:Math.floor(Math.random()*25)+65}];
var tips=['用氨基酸表活温和清洁，避免强力去油','每周1-2次头皮深层清洁','水温38℃左右，指腹按摩','每2-3天洗一次'];
if(type==='敏感性头皮')tips[0]='暂停含香精酒精产品';
cur={score,type,dims,tips};show(cur)};

function show(r){sn.textContent=r.score;sc.style.setProperty('--p',r.score+'%');
ht.textContent=r.type;sm.textContent=r.score>=80?'头皮状态优秀':r.score>=70?'基本健康':'需要开始护理了';
dc.innerHTML='';for(var i=0;i<r.dims.length;i++){var d=r.dims[i];var c=d.s>=80?'#64c882':d.s>=65?'#64b4ff':'#e8d5b7';
dc.innerHTML+='<div class="dm"><span class="l">'+d.l+'</span><div class="b"><div class="f" style="width:'+d.s+'%;background:'+c+'"></div></div><span class="v" style="color:'+c+'">'+d.s+'</span></div>'}
tc.innerHTML='';for(var i=0;i<r.tips.length;i++){tc.innerHTML+='<p style="margin:0 0 6px;padding-left:16px">• <span style="color:rgba(255,255,255,.45)">'+r.tips[i]+'</span></p>'}
rp.classList.add('active');window.scrollTo({top:rp.offsetTop-60,behavior:'smooth'})};

function rd(){var e=document.querySelector('.ov.active');if(e)e.classList.remove('active')};

function msg(m){var t=document.getElementById('tt');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none'},2500)};

async function gp(){if(!cur){msg('先完成检测');return}msg('生成海报...');
try{var s=cur.score;var t=encodeURIComponent(cur.type);
var w=window.open('/fenzhen/poster?s='+s+'&t='+t+'&kt='+Date.now(),'_blank','width=420,height=800');
if(w)msg('海报已生成');else msg('请允许弹窗')}catch(e){msg('失败: '+e.message)}};

function sr(){if(!cur)return;
var t='我的头皮健康分 '+cur.score+' 分！快来安柯耳测测你的头皮吧 https://airaquas.hair/';
if(navigator.share)navigator.share({title:'安柯耳 AI 头皮健康',text:t}).catch(function(){});
else navigator.clipboard.writeText(t).then(function(){msg('文案已复制!')}).catch(function(){msg('截图分享给朋友')})};
</script></body></html>
